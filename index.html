<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container { padding: 30px; }

.card {
  background: rgba(255,255,255,0.15);
  padding: 20px;
  margin: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

img {
  width: 80%;
  max-width: 250px;
  border-radius: 15px;
  margin: 10px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: black;
  font-size: 15px;
  margin: 10px;
  position: relative;
}

/* Bouquet */
#bouquet { font-size: 60px; display: none; }

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

<h1>Hey Raina❤️</h1>
<p>I made this just for you...</p>

<div class="card">
<h2>💌 Why You Matter</h2>
<p>I know things felt a little off… but I still choose you.</p>
</div>

<div class="card">
<h2>📸 Our Memories</h2>
<img src="photo1.jpg">
<img src="photo2.jpg">
</div>

<div class="card">
<h2>🎵 Our Song</h2>
<audio controls>
<source src="song.mp3">
</audio>
</div>

<div class="card">
<h2>⏳ Our Time Together</h2>
<p id="loveTime"></p>
</div>

<div class="card">
<h2>🌸 A Small Surprise</h2>
<button onclick="showBouquet()">Open</button>
<div id="bouquet">💐</div>
<p id="bouquetMsg"></p>
</div>

<!-- LOVE GAME -->
<div class="card">
<h2>💖 One Question</h2>
<p>Do you love me? 😏</p>
<button onclick="yesLove()">YES ❤️</button>
<button id="noBtn" onmouseover="moveNo()">NO 😅</button>
<p id="loveMsg"></p>
</div>

<div class="card">
<h2>💖 Final Message</h2>
<p>I’m not going anywhere.</p>
</div>

</div>

<script>

/* TIME */
let startDate = new Date("2025-09-27 00:00:00");

function updateTime() {
  let now = new Date();
  let diff = now - startDate;

  let days = Math.floor(diff / (1000*60*60*24));
  document.getElementById("loveTime").innerText =
    days + " days together ❤️";
}
setInterval(updateTime, 1000);

/* Bouquet */
function showBouquet() {
  document.getElementById("bouquet").style.display = "block";
  document.getElementById("bouquetMsg").innerText =
  "These are for you 🌸";
}

/* LOVE GAME */
function yesLove() {
  document.getElementById("loveMsg").innerText =
  "I knew it 😌❤️";
}

function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.left = Math.random()*80 + "vw";
  btn.style.top = Math.random()*80 + "vh";
}

/* Hearts */
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerText = "❤️";
  h.style.left = Math.random()*100 + "vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);

</script>

</body>
</html>
